# Name of your application. Used to uniquely configure containers.
service: lokaler-lnu-no

# Name of the container image.
image: danieljacksonnor/lokaler-lnu-no

# Deploy to these servers.
servers:
  web:
    - 95.216.137.182
proxy:
  ssl: true
  host: staging-lokaler.digitalfrivillighet.no
registry:
  username: danieljacksonnor
  password:
    - KAMAL_REGISTRY_PASSWORD
builder:
  arch: amd64
env:
  clear:
    RAILS_ENV: production
    POSTGRES_USERNAME: postgres
    RAILS_SERVE_STATIC_FILES: 'true'
    ACTIVE_STORAGE_SERVICE: local
    DATABASE_HOST: db
    QUEUE_DATABASE_HOST: queue_db
    CABLE_DATABASE_HOST: cable_db
    CACHE_DATABASE_HOST: cache_db
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
accessories:
  db:
    image: postgis/postgis:15-3.3
    host: 95.216.137.182
    port: 5432
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: lokaler_lnu_no_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  cache_db:
    image: postgres:15
    host: 95.216.137.182
    port: 5433
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: lokaler_lnu_no_production_cache
      secret:
        - POSTGRES_PASSWORD
    directories:
      - cache_data:/var/lib/postgresql/data
  queue_db:
    image: postgres:15
    host: 95.216.137.182
    port: 5434
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: lokaler_lnu_no_production_queue
      secret:
        - POSTGRES_PASSWORD
    directories:
      - queue_data:/var/lib/postgresql/data
  cable_db:
    image: postgres:15
    host: 95.216.137.182
    port: 5435
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: lokaler_lnu_no_production_cable
      secret:
        - POSTGRES_PASSWORD
    directories:
      - cable_data:/var/lib/postgresql/data
